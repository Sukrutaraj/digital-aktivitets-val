<!DOCTYPE html>
<html lang='sv'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0,user-scalable=no'>
<title>IT projekt på Diabasen och Nilis</title>
<style>
body{font-family:sans-serif;background:#1a1a2e;margin:0;padding:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.slide{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:700px;padding:20px;text-align:center;}
.slide.active{display:flex;}
.slide img{max-width:90vw;max-height:55vh;object-fit:contain;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.slide-label{font-size:clamp(20px,4vw,36px);font-weight:700;color:#fff;margin-top:16px;text-shadow:0 2px 8px rgba(0,0,0,0.4);}
.play-btn{margin-top:16px;padding:14px 32px;background:#4CAF50;color:white;border:none;border-radius:50px;font-size:clamp(16px,2.5vw,22px);cursor:pointer;box-shadow:0 4px 12px rgba(76,175,80,0.4);}
.play-btn:active{background:#388E3C;transform:scale(0.96);}
.nav{position:fixed;bottom:32px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px;}
.nav-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.nav-btn:hover{background:rgba(255,255,255,0.2);}
.nav-btn:active{transform:scale(0.92);}
.nav-btn:disabled{opacity:0.25;cursor:default;}
.counter{color:rgba(255,255,255,0.6);font-size:14px;font-family:monospace;min-width:48px;text-align:center;}
.progress{position:fixed;top:0;left:0;height:4px;background:#4CAF50;transition:width 0.3s ease;}
</style>
</head>
<body>
<div class='progress' id='progress' style='width:0%'></div>
<script type='application/json' id='slot-data'>[{"alt":"Vardags utmaningar","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-0.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-0.webm"},{"alt":"Personal insats","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-1.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-1.webm"},{"alt":"Att tänka om","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-2.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-2.webm"},{"alt":"Introduktion av tekniska lösningar","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-3.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-3.webm"},{"alt":"Några verkliga exempel","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-4.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-4.webm"},{"alt":"Relationsbyggande","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-5.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-5.webm"},{"alt":"Testa","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-6.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-6.webm"},{"alt":"Handleda","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-7.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-7.webm"},{"alt":"Effekt","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-8.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-8.webm"},{"alt":"Införa i andra liknande situationer","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-9.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-9.webm"},{"alt":"Målet","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-10.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-10.webm"},{"alt":"Ett levande tankesätt","imgUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-img-11.jpg","audioUrl":"https://sukrutaraj.github.io/digital-aktivitets-val/aktivitetsval-1779194232509-audio-11.webm"}]</script>
<div id='slides'></div>
<nav class='nav'>
  <button class='nav-btn' id='prev-btn' disabled>&#8592;</button>
  <span class='counter' id='counter'>1 / 1</span>
  <button class='nav-btn' id='next-btn'>&#8594;</button>
</nav>
<script>
var slots=JSON.parse(document.getElementById('slot-data').textContent);
var cur=0;
var currentAudio=null;

function play(url){
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
  currentAudio=new Audio(url);
  var p=currentAudio.play();
  if(p&&p.catch)p.catch(function(e){console.log('Audio:',e);});
}

function showSlide(n){
  var slides=document.querySelectorAll('.slide');
  if(n<0||n>=slides.length)return;
  slides.forEach(function(s){s.classList.remove('active');});
  slides[n].classList.add('active');
  cur=n;
  document.getElementById('prev-btn').disabled=(cur===0);
  document.getElementById('next-btn').disabled=(cur===slides.length-1);
  document.getElementById('counter').textContent=(cur+1)+' / '+slides.length;
  var pct=Math.round(((cur+1)/slides.length)*100);
  document.getElementById('progress').style.width=pct+'%';
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
}

function render(){
  var container=document.getElementById('slides');
  container.innerHTML='';
  slots.forEach(function(s,i){
    var slide=document.createElement('div');
    slide.className='slide'+(i===0?' active':'');
    if(s.imgUrl){
      var img=document.createElement('img');
      img.src=s.imgUrl;img.alt=s.alt||'';
      slide.appendChild(img);
    }
    if(s.alt){
      var lbl=document.createElement('div');
      lbl.className='slide-label';
      lbl.textContent=s.alt;
      slide.appendChild(lbl);
    }
    if(s.audioUrl){
      var btn=document.createElement('button');
      btn.className='play-btn';
      btn.textContent='🔊 Spela ljud';
      (function(url){btn.onclick=function(){play(url);};})(s.audioUrl);
      slide.appendChild(btn);
    }
    container.appendChild(slide);
  });
  showSlide(0);
}

document.getElementById('prev-btn').addEventListener('click',function(){showSlide(cur-1);});
document.getElementById('next-btn').addEventListener('click',function(){showSlide(cur+1);});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();showSlide(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();showSlide(cur-1);}
});

var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50)showSlide(dx<0?cur+1:cur-1);
},{passive:true});

render();
</script>
</body>
</html>
