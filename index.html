<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital Aktivitetsval</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:900px;margin:auto;}
.section{background:white;padding:12px;margin:10px auto;border-radius:12px;}
input[type="text"]{width:90%;padding:8px;margin:6px;border-radius:8px;border:1px solid #ddd;font-size:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:10px;}
.slot{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px;text-align:left;}
.slot-label{font-weight:bold;font-size:13px;margin-bottom:6px;color:#555;}
.slot img{width:100%;max-height:100px;object-fit:contain;border-radius:8px;margin-top:6px;display:block;}
.slot-input-label{font-size:12px;color:#888;margin-top:8px;display:block;}
.slot input[type="file"]{width:100%;font-size:12px;margin-top:2px;}
.slot input[type="text"]{width:100%;padding:5px 8px;font-size:13px;margin:4px 0 0 0;border-radius:6px;border:1px solid #ddd;}
.smallBtn{background:#eee;padding:6px 10px;border-radius:6px;cursor:pointer;margin:3px;border:none;font-size:13px;}
.smallBtn:active{transform:scale(0.95);}
.rec-active{background:#ffcccc!important;}
.audio-ok{color:#4CAF50;font-size:11px;display:block;margin-top:4px;}
.audio-no{color:#999;font-size:11px;display:block;margin-top:4px;}
.tool-row{display:flex;justify-content:center;gap:25px;margin-top:15px;flex-wrap:wrap;}
.tool-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.tool-btn .icon{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #333;font-size:26px;background:white;}
.tool-btn .label{margin-top:6px;font-size:13px;}
button,.smallBtn{transition:all 0.1s ease;}
button:active{transform:scale(0.95);}
.tool-btn:active .icon{transform:scale(0.92);background:#eee;}
#add-slot-btn{margin-top:10px;padding:8px 18px;background:#eee;border:none;border-radius:8px;cursor:pointer;font-size:14px;}
#preview{display:none;text-align:left;}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:10px;}
.preview-cell{background:white;border-radius:10px;padding:10px;text-align:center;border:1px solid #eee;}
.preview-cell img{width:100%;max-height:90px;object-fit:contain;border-radius:8px;}
.preview-cell p{margin-top:6px;font-size:13px;color:#333;}
.play-btn{display:block;width:100%;margin-top:6px;padding:8px;background:#4CAF50;color:white;border:none;border-radius:50px;font-size:15px;cursor:pointer;}
.play-btn:active{background:#388E3C;transform:scale(0.96);}

/* QR modal */
#qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;}
#qr-modal.on{display:flex;}
.qr-box{background:#fff;border-radius:20px;padding:28px 24px;text-align:center;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.qr-heading{font-size:16px;font-weight:700;color:#333;margin-bottom:4px;}
.qr-url{font-size:11px;color:#999;margin-bottom:14px;word-break:break-all;}
#qr-canvas{border-radius:8px;margin-bottom:14px;}
.qr-dl{padding:10px 22px;background:#4CAF50;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;margin:4px;}
.qr-cl{padding:10px 22px;background:#eee;color:#333;border:none;border-radius:50px;font-size:14px;cursor:pointer;margin:4px;}

/* Spinner */
#link-spinner{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9998;align-items:center;justify-content:center;}
#link-spinner.on{display:flex;}
.sp-ring{width:54px;height:54px;border:6px solid rgba(255,255,255,0.2);border-top:6px solid #c87941;border-radius:50%;animation:sp-spin 0.75s linear infinite;}
@keyframes sp-spin{to{transform:rotate(360deg);}}

</style>
</head>
<body>

<h2>Digital Aktivitetsval</h2>

<div class="section">
  <input id="title" type="text" placeholder="Titel, t.ex. Morgonval">
</div>

<div class="section">
  <div class="grid" id="slots"></div>
  <button id="add-slot-btn" onclick="addSlot()">➕ Lägg till ruta</button>
</div>

<div class="tool-row">
  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Ladda ner JSON</div>
  </div>
  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Ladda upp JSON</div>
  </div>
  <div class="tool-btn" onclick="createLink()">
    <div class="icon">🔗</div>
    <div class="label">Skapa länk</div>
  </div>
  <div class="tool-btn" onclick="downloadPDF()">
    <div class="icon">🖨️</div>
    <div class="label">Skriv ut PDF</div>
  </div>
</div>

<br>
<button onclick="generatePreview()">▶️ Förhandsgranska</button>

<div id="preview" class="section">
  <h3 id="preview-title"></h3>
  <div class="preview-grid" id="preview-grid"></div>
</div>

<script>
var slots=[], mediaRecorder=null, audioChunks=[], recordingIdx=null, currentAudio=null;

function getBestMime(){
  if(typeof MediaRecorder==="undefined")return"";
  var list=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus","audio/ogg"];
  for(var i=0;i<list.length;i++){try{if(MediaRecorder.isTypeSupported(list[i]))return list[i];}catch(e){}}
  return"";
}
function getExt(mime){
  if(!mime)return"webm";
  if(mime.indexOf("mp4")>-1)return"m4a";
  if(mime.indexOf("ogg")>-1)return"ogg";
  return"webm";
}
function playDataUrl(dataUrl){
  if(!dataUrl)return;
  try{
    if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
    currentAudio=new Audio(dataUrl);
    var p=currentAudio.play();
    if(p&&p.catch)p.catch(function(e){alert("Kunde inte spela upp.\n"+e.message);});
  }catch(e){alert("Ljud stöds ej: "+e.message);}
}
function toggleRecording(i){
  if(mediaRecorder&&mediaRecorder.state==="recording"){stopRecording();}
  else{startRecording(i);}
}
function startRecording(i){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Mikrofoninspelning stöds inte på denna enhet/webbläsare.");return;
  }
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
  .then(function(stream){
    audioChunks=[];recordingIdx=i;
    var mime=getBestMime();
    try{mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);}
    catch(e){mediaRecorder=new MediaRecorder(stream);}
    mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var usedMime=mediaRecorder.mimeType||mime||"audio/webm";
      var blob=new Blob(audioChunks,{type:usedMime});
      var reader=new FileReader();
      reader.onload=function(){slots[i].audio=reader.result;slots[i].audioExt=getExt(usedMime);render();};
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(function(t){t.stop();});
    };
    mediaRecorder.start(100);
    var btn=document.getElementById("rec-btn-"+i);
    if(btn){btn.textContent="⏹ Stoppa";btn.classList.add("rec-active");}
    setTimeout(function(){if(mediaRecorder&&mediaRecorder.state==="recording")stopRecording();},15000);
  })
  .catch(function(err){
    if(err.name==="NotAllowedError")alert("Mikrofonåtkomst nekades.");
    else alert("Fel: "+err.message);
  });
}
function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state==="recording")mediaRecorder.stop();
  var btn=document.getElementById("rec-btn-"+recordingIdx);
  if(btn){btn.textContent="🎤 Spela in";btn.classList.remove("rec-active");}
}
function render(){
  var container=document.getElementById("slots");
  container.innerHTML="";
  slots.forEach(function(slot,i){
    var div=document.createElement("div");
    div.className="slot";
    var html='<div class="slot-label">Ruta '+(i+1)+'</div>';
    html+='<span class="slot-input-label">📷 Bild</span>';
    html+='<input type="file" accept="image/*" onchange="loadImage(event,'+i+')">';
    if(slot.img)html+='<img src="'+slot.img+'" alt="'+slot.alt+'">';
    html+='<span class="slot-input-label">🎙 Ljud</span>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">';
    html+='<button class="smallBtn" id="rec-btn-'+i+'" onclick="toggleRecording('+i+')">🎤 Spela in</button>';
    if(slot.audio){
      html+='<button class="smallBtn" onclick="playDataUrl(slots['+i+'].audio)">▶️ Lyssna</button>';
      html+='<button class="smallBtn" style="color:#c00" onclick="slots['+i+'].audio=\'\';slots['+i+'].audioExt=\'\';render()">🗑</button>';
    }else{
      html+='<button class="smallBtn" disabled style="opacity:0.4">▶️ Lyssna</button>';
    }
    html+='</div>';
    html+=slot.audio?'<span class="audio-ok">✔ Ljud inspelat</span>':'<span class="audio-no">Inget ljud</span>';
    html+='<span class="slot-input-label">📝 Beskrivning</span>';
    html+='<input type="text" value="'+slot.alt+'" placeholder="t.ex. Laga kaffe" oninput="slots['+i+'].alt=this.value">';
    html+='<div style="margin-top:8px;text-align:right">';
    html+='<button class="smallBtn" onclick="moveUp('+i+')">🔼</button>';
    html+='<button class="smallBtn" onclick="moveDown('+i+')">🔽</button>';
    html+='<button class="smallBtn" onclick="removeSlot('+i+')">🗑</button>';
    html+='</div>';
    div.innerHTML=html;
    container.appendChild(div);
  });
}
function addSlot(){slots.push({alt:"",img:"",audio:"",audioExt:""});render();}
function removeSlot(i){slots.splice(i,1);render();}
function moveUp(i){if(i===0)return;var t=slots[i];slots[i]=slots[i-1];slots[i-1]=t;render();}
function moveDown(i){if(i===slots.length-1)return;var t=slots[i];slots[i]=slots[i+1];slots[i+1]=t;render();}
function loadImage(e,i){
  var file=e.target.files[0];if(!file)return;
  var img=new Image(),reader=new FileReader();
  reader.onload=function(ev){
    img.onload=function(){
      var canvas=document.createElement("canvas"),maxW=600,w=img.width,h=img.height;
      if(w>maxW){h=h*maxW/w;w=maxW;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      canvas.toBlob(function(blob){
        var r2=new FileReader();
        r2.onload=function(){slots[i].img=r2.result;render();};
        r2.readAsDataURL(blob);
      },"image/jpeg",0.7);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function generatePreview(){
  var title=document.getElementById("title").value.trim()||"Aktivitetsval";
  document.getElementById("preview-title").textContent=title;
  var grid=document.getElementById("preview-grid");
  grid.innerHTML="";
  slots.forEach(function(slot,i){
    if(!slot.img&&!slot.alt)return;
    var cell=document.createElement("div");
    cell.className="preview-cell";
    var html="";
    if(slot.img)html+='<img src="'+slot.img+'" alt="'+slot.alt+'">';
    html+='<p>'+(slot.alt||"")+'</p>';
    if(slot.audio)html+='<button class="play-btn" onclick="playDataUrl(slots['+i+'].audio)">🔊 Spela</button>';
    cell.innerHTML=html;
    grid.appendChild(cell);
  });
  document.getElementById("preview").style.display="block";
}
function exportJSON(){
  var data={title:document.getElementById("title").value.trim(),slots:slots};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="aktivitetsval.json";a.click();
}
function importJSON(){
  var input=document.createElement("input");input.type="file";input.accept="application/json";
  input.onchange=function(e){
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        document.getElementById("title").value=data.title||"";
        slots=(data.slots||[]).map(function(s){return{alt:s.alt||"",img:s.img||"",audio:s.audio||"",audioExt:s.audioExt||""};});
        render();alert("Aktivitetsval laddat!");
      }catch(e){alert("Ogiltig fil");}
    };
    r.readAsText(e.target.files[0]);
  };
  input.click();
}
async function uploadFile(path,content,repo){
  var res=await fetch("https://upload-api-kappa.vercel.app/api/upload",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({path:path,content:content,repo:repo})
  });
  var data=await res.json();
  if(!data.ok)throw new Error(data.error||"Upload failed");
  return data;
}
async function createLink(){
  var title=document.getElementById("title").value.trim()||"Aktivitetsval";
  var filled=slots.filter(function(s){return s.img||s.alt;});
  if(filled.length===0){alert("Lägg till minst en ruta med bild eller beskrivning.");return;}

  document.getElementById('link-spinner').classList.add('on');
  var id=Date.now(),base="aktivitetsval-"+id,repo="Sukrutaraj/digital-aktivitets-val";
  var uploadedSlots=[];
  try{
    for(var i=0;i<slots.length;i++){
      var s=slots[i];
      if(!s.img&&!s.alt)continue;
      var imgUrl="",audioUrl="";
      if(s.img){
        var imgName=base+"-img-"+i+".jpg";
        await uploadFile(imgName,s.img.split(",")[1],repo);
        await new Promise(function(r){setTimeout(r,300);});
        imgUrl="https://sukrutaraj.github.io/digital-aktivitets-val/"+imgName;
      }
      if(s.audio){
        var ext=s.audioExt||getExt((s.audio.split(";")[0]||"").replace("data:audio/",""));
        var audioName=base+"-audio-"+i+"."+ext;
        await uploadFile(audioName,s.audio.split(",")[1],repo);
        await new Promise(function(r){setTimeout(r,300);});
        audioUrl="https://sukrutaraj.github.io/digital-aktivitets-val/"+audioName;
      }
      uploadedSlots.push({alt:s.alt,imgUrl:imgUrl,audioUrl:audioUrl});
    }
    var safeTitle=title.replace(/</g,"&lt;").replace(/>/g,"&gt;");
    var slotsJson=JSON.stringify(uploadedSlots);
    var css=[
      "body{font-family:sans-serif;background:#f2f2f2;padding:20px;max-width:960px;margin:auto;}",
      "h1{text-align:center;margin-bottom:20px;}",
      ".grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}",
      ".cell{background:white;border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);}",
      ".cell img{width:100%;max-height:120px;object-fit:contain;border-radius:10px;display:block;margin:0 auto;}",
      ".cell p{margin:8px 0 6px;font-size:15px;font-weight:600;color:#333;}",
      ".cell.selected{outline:4px solid #4CAF50;}",
      ".play-btn{display:block;width:100%;margin-top:6px;padding:10px;background:#4CAF50;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;}",
      ".play-btn:active{background:#388E3C;transform:scale(0.96);}"
    ].join("\n");
    var scriptCode=[
      "var cur=null;",
      "function play(url,cell){",
      "  document.querySelectorAll('.cell').forEach(function(c){c.classList.remove('selected');});",
      "  if(cell)cell.classList.add('selected');",
      "  if(cur){cur.pause();cur.currentTime=0;}",
      "  cur=new Audio(url);",
      "  var p=cur.play();",
      "  if(p&&p.catch)p.catch(function(e){console.log(e);});",
      "}",
      "function render(){",
      "  var slots=JSON.parse(document.getElementById('slot-data').textContent);",
      "  var g=document.getElementById('grid');g.innerHTML='';",
      "  slots.forEach(function(s,i){",
      "    var c=document.createElement('div');c.className='cell';c.id='c'+i;",
      "    var h='';",
      "    if(s.imgUrl)h+='<img src=\"'+s.imgUrl+'\" alt=\"'+s.alt+'\">';",
      "    h+='<p>'+(s.alt||'')+'</p>';",
      "    c.innerHTML=h;",
      "    if(s.audioUrl){",
      "      var btn=document.createElement('button');btn.className='play-btn';btn.textContent='🔊 Spela';",
      "      (function(u,el){btn.onclick=function(){play(u,el);};})(s.audioUrl,c);",
      "      c.appendChild(btn);",
      "    }",
      "    g.appendChild(c);",
      "  });",
      "}",
      "render();"
    ].join("\n");
    var sharedHtml=[
      "<!DOCTYPE html>","<html lang='sv'>","<head>",
      "<meta charset='UTF-8'>","<meta name='viewport' content='width=device-width,initial-scale=1.0'>",
      "<title>"+safeTitle+"</title>","<style>",css,"</style>","</head>","<body>",
      "<h1>"+safeTitle+"</h1>",
      "<script type='application/json' id='slot-data'>"+slotsJson+"<"+"/script>",
      "<div class='grid' id='grid'></div>",
      "<script>",scriptCode,"<"+"/script>",
      "</body>","</html>"
    ].join("\n");
    await uploadFile(base+".html",btoa(unescape(encodeURIComponent(sharedHtml))),repo);
    var url="https://sukrutaraj.github.io/digital-aktivitets-val/"+base+".html";
    var copied=false;
    try{await navigator.clipboard.writeText(url);copied=true;}catch(e){}
    document.getElementById('link-spinner').classList.remove('on');
    document.getElementById('qr-copied').textContent = copied ? '✔ Länken är kopierad till urklipp' : '⚠️ Kopiera länken manuellt';
    document.getElementById('qr-copied').style.color = copied ? '#4CAF50' : '#e67e22';
    showQR(url, title || 'Länk skapad');
  }catch(err){alert("Fel: "+err.message);}
}
for(var i=0;i<8;i++)slots.push({alt:"",img:"",audio:"",audioExt:""});
render();

/* ===== QR KOD ===== */
function showQR(url, title) {
  document.getElementById('qr-h').textContent = title || 'QR-kod';
  document.getElementById('qr-u').textContent = url;
  document.getElementById('qr-modal').classList.add('on');
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);
  function doQR() {
    var div = document.createElement('div');
    new QRCode(div, {text:url,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(function(){
      var el = div.querySelector('canvas') || div.querySelector('img');
      if(!el) return;
      if(el.tagName==='CANVAS'){ ctx.drawImage(el,0,0,200,200); }
      else { var i=new Image(); i.onload=function(){ctx.drawImage(i,0,0,200,200);}; i.src=el.src; }
    }, 400);
  }
  if(typeof QRCode==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=doQR; document.head.appendChild(s);
  } else { doQR(); }
}

function dlQRpdf() {
  var title = document.getElementById('qr-h').textContent;
  var url   = document.getElementById('qr-u').textContent;
  var canvas = document.getElementById('qr-canvas');
  function build(Lib) {
    var doc = new Lib({orientation:'portrait',unit:'mm',format:'a4'});
    var W = doc.internal.pageSize.getWidth();
    doc.setFontSize(22); doc.setFont('helvetica','bold');
    doc.text(title, W/2, 30, {align:'center'});
    var sz=100, x=(W-sz)/2;
    doc.addImage(canvas.toDataURL('image/png'),'PNG',x,45,sz,sz);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
    doc.text(url, W/2, 158, {align:'center', maxWidth:W-30});
    doc.save((title.replace(/[^a-zA-Z0-9 ]/g,'_')||'qrkod')+'_QR.pdf');
  }
  function load(cb){
    if(typeof jsPDF!=='undefined'){cb(jsPDF);return;}
    if(window.jspdf){cb(window.jspdf.jsPDF);return;}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){cb(window.jspdf?window.jspdf.jsPDF:jsPDF);};
    document.head.appendChild(s);
  }
  load(build);
}


/* ===== LADDA NER PDF ===== */
function downloadPDF(){
  var title = document.getElementById('title').value.trim() || "Aktivitetsval";
  var filled = slots.filter(function(s){ return s.img || s.alt; });
  if(filled.length === 0){ alert("Lägg till minst en ruta."); return; }

  // Ask format
  var fmt = confirm("Klicka OK för A3, Avbryt för A4") ? "a3" : "a4";

  function getImgDims(dataUrl, maxW, maxH){
    return new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){
        var w = img.naturalWidth, h = img.naturalHeight, ratio = w/h;
        if(w > maxW){ w = maxW; h = w/ratio; }
        if(h > maxH){ h = maxH; w = h*ratio; }
        resolve({w: Math.round(w), h: Math.round(h)});
      };
      img.onerror = function(){ resolve({w: maxW, h: maxH}); };
      img.src = dataUrl;
    });
  }

  function buildPDF(Lib){
    var doc = new Lib({orientation:"landscape", unit:"mm", format: fmt});
    var pageW = doc.internal.pageSize.getWidth();
    var pageH = doc.internal.pageSize.getHeight();
    var margin = 12;

    // Titel
    doc.setFillColor(245,245,245);
    doc.rect(0, 0, pageW, 20, "F");
    doc.setFontSize(16); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
    doc.text(title, pageW/2, 13, {align:"center"});

    // Grid beräkning – max 4 kolumner
    var cols = filled.length <= 4 ? filled.length : 4;
    var rows = Math.ceil(filled.length / cols);
    var cellW = (pageW - margin*2) / cols;
    var cellH = (pageH - margin - 22) / rows;
    var imgMaxW = cellW - 8;
    var imgMaxH = cellH - 16;

    // Hämta bilddimensioner
    var dimPromises = filled.map(function(s){
      if(!s.img) return Promise.resolve(null);
      return getImgDims(s.img, imgMaxW, imgMaxH);
    });

    Promise.all(dimPromises).then(function(dims){
      for(var i = 0; i < filled.length; i++){
        var s = filled[i];
        var dim = dims[i];
        var col = i % cols;
        var row = Math.floor(i / cols);
        var x = margin + col * cellW;
        var y = 22 + row * cellH;

        // Cellram
        doc.setDrawColor(200,200,200); doc.setLineWidth(0.4);
        doc.roundedRect(x+1, y+1, cellW-2, cellH-2, 2, 2);

        // Bild centrerad i cellen
        if(s.img && dim){
          var imgX = x + (cellW - dim.w) / 2;
          var imgY = y + 4;
          try{ doc.addImage(s.img, "JPEG", imgX, imgY, dim.w, dim.h); }catch(e){}
        }

        // Text centrerad under bilden
        if(s.alt){
          doc.setFontSize(fmt === "a3" ? 13 : 10);
          doc.setFont("helvetica","bold");
          doc.setTextColor(40,40,40);
          var lines = doc.splitTextToSize(s.alt, cellW - 6);
          var textY = y + cellH - (lines.length * (fmt === "a3" ? 6 : 5)) - 2;
          doc.text(lines, x + cellW/2, textY, {align:"center"});
        }
      }

      // Fotrad
      doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(180,180,180);
      doc.text("Daglig Verksamhet – Digital Aktivitetsval", pageW/2, pageH - 4, {align:"center"});

      var name = title.replace(/[^a-zA-Z0-9 ]/g,"_");
      doc.save(name + "_" + fmt.toUpperCase() + ".pdf");
    });
  }

  if(typeof jsPDF!=="undefined"){ buildPDF(jsPDF); return; }
  if(window.jspdf){ buildPDF(window.jspdf.jsPDF); return; }
  var s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload = function(){ buildPDF(window.jspdf ? window.jspdf.jsPDF : jsPDF); };
  document.head.appendChild(s);
}
</script>
